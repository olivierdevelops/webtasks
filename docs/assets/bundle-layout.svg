<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="Config bundle layout">
  <defs>
    <style>
      .folder { fill: #fff3e0; stroke: #fb8c00; stroke-width: 2; }
      .file { fill: #fff; stroke: #5c6bc0; stroke-width: 1.5; }
      .label { font: 13px monospace; fill: #37474f; }
      .heading { font: 600 16px system-ui,sans-serif; fill: #283593; }
    </style>
  </defs>
  <rect width="720" height="400" rx="10" fill="#fafafa"/>
  <text class="heading" x="360" y="36" text-anchor="middle">Config bundle (directory or .zip  read in-place)</text>

  <rect class="folder" x="40" y="60" width="640" height="310" rx="8"/>
  <text class="label" x="60" y="90">bundle/</text>

  <rect class="folder" x="80" y="105" width="280" height="240" rx="6"/>
  <text class="label" x="100" y="130">tasks/</text>
  <rect class="file" x="100" y="145" width="240" height="28" rx="4"/>
  <text class="label" x="110" y="164">pool</text>
  <rect class="folder" x="100" y="185" width="220" height="140" rx="4"/>
  <text class="label" x="115" y="205">**/*.webtask</text>
  <rect class="file" x="115" y="218" width="190" height="24" rx="3"/>
  <text class="label" x="125" y="235" font-size="11">crawl/hackernews-top.webtask</text>
  <rect class="file" x="115" y="250" width="190" height="24" rx="3"/>
  <text class="label" x="125" y="267" font-size="11">basics/title.webtask</text>
  <rect class="file" x="115" y="282" width="190" height="24" rx="3"/>
  <text class="label" x="125" y="299" font-size="11">&</text>

  <rect class="folder" x="390" y="105" width="260" height="120" rx="6"/>
  <text class="label" x="410" y="130">scripts/</text>
  <rect class="file" x="410" y="145" width="220" height="28" rx="4"/>
  <text class="label" x="420" y="164">demo/page-stats.js</text>
  <rect class="file" x="410" y="180" width="220" height="28" rx="4"/>
  <text class="label" x="420" y="199">concio/login.js</text>

  <rect class="file" x="390" y="245" width="260" height="28" rx="4"/>
  <text class="label" x="400" y="264">static-mounts</text>
  <rect class="file" x="390" y="285" width="260" height="28" rx="4"/>
  <text class="label" x="400" y="304">secrets</text>

  <text class="label" x="360" y="385" text-anchor="middle" font-size="12" fill="#78909c">Set WEBTASKS_BUNDLE=/path/to/bundle  hot-reloads on every request</text>
</svg>
