<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-label="webtasks architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#f3e5f5"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5c6bc0"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #5c6bc0; stroke-width: 2; }
      .title { font: 600 14px system-ui,sans-serif; fill: #283593; }
      .sub { font: 12px system-ui,sans-serif; fill: #5c6bc0; }
      .arrow { stroke: #5c6bc0; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="820" height="320" rx="12" fill="url(#bg)"/>
  <text x="410" y="32" text-anchor="middle" font="700 18px system-ui,sans-serif" fill="#283593">webtasks  one binary, YAML tasks, HTTP API</text>

  <!-- Client -->
  <rect class="box" x="30" y="70" width="130" height="70" rx="8"/>
  <text class="title" x="95" y="100" text-anchor="middle">HTTP client</text>
  <text class="sub" x="95" y="120" text-anchor="middle">curl · Python · JS</text>

  <!-- Server -->
  <rect class="box pulse" x="210" y="55" width="160" height="100" rx="8"/>
  <text class="title" x="290" y="90" text-anchor="middle">webtasks server</text>
  <text class="sub" x="290" y="110" text-anchor="middle">Go binary</text>
  <text class="sub" x="290" y="128" text-anchor="middle">REST + SSE</text>

  <!-- Bundle -->
  <rect class="box" x="210" y="190" width="160" height="90" rx="8"/>
  <text class="title" x="290" y="220" text-anchor="middle">Config bundle</text>
  <text class="sub" x="290" y="240" text-anchor="middle">tasks/*.yaml</text>
  <text class="sub" x="290" y="258" text-anchor="middle">scripts/*.js</text>

  <!-- Chrome pool -->
  <rect class="box pulse" x="420" y="70" width="160" height="100" rx="8"/>
  <text class="title" x="500" y="100" text-anchor="middle">Chrome pool</text>
  <text class="sub" x="500" y="120" text-anchor="middle">chromedp / CDP</text>
  <text class="sub" x="500" y="138" text-anchor="middle">window lease</text>

  <!-- Web -->
  <rect class="box" x="630" y="70" width="150" height="100" rx="8"/>
  <text class="title" x="705" y="105" text-anchor="middle">Target sites</text>
  <text class="sub" x="705" y="125" text-anchor="middle">any URL</text>

  <line class="arrow" x1="160" y1="105" x2="208" y2="105"/>
  <line class="arrow" x1="370" y1="105" x2="418" y2="105"/>
  <line class="arrow" x1="580" y1="105" x2="628" y2="105"/>
  <line class="arrow" x1="290" y1="155" x2="290" y2="188"/>
  <text class="sub" x="175" y="95">POST /tasks/&</text>
  <text class="sub" x="395" y="95">flow steps</text>
  <text class="sub" x="600" y="95">goto · click</text>
</svg>
