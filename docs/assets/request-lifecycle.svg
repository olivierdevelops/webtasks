<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-label="Request lifecycle">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7e57c2"/>
    </marker>
    <style>
      .step { fill: #fff; stroke: #7e57c2; stroke-width: 2; }
      .num { font: 700 11px system-ui,sans-serif; fill: #fff; }
      .txt { font: 12px system-ui,sans-serif; fill: #4527a0; }
      .line { stroke: #7e57c2; stroke-width: 2; fill: none; marker-end: url(#a); }
      @keyframes flow { 0%{stroke-dashoffset:20} 100%{stroke-dashoffset:0} }
      .animate-line { stroke-dasharray: 8 4; animation: flow 1.5s linear infinite; }
    </style>
  </defs>
  <rect width="760" height="280" rx="10" fill="#f3e5f5"/>
  <text x="380" y="28" text-anchor="middle" font="600 15px system-ui,sans-serif" fill="#4527a0">POST /tasks/crawl/hackernews-top  request lifecycle</text>

  <g transform="translate(20,50)">
    <rect class="step" x="0" y="0" width="100" height="56" rx="8"/>
    <circle cx="16" cy="16" r="10" fill="#7e57c2"/><text class="num" x="16" y="20" text-anchor="middle">1</text>
    <text class="txt" x="50" y="28" text-anchor="middle">HTTP</text>
    <text class="txt" x="50" y="44" text-anchor="middle">handler</text>
  </g>
  <g transform="translate(140,50)">
    <rect class="step" x="0" y="0" width="100" height="56" rx="8"/>
    <circle cx="16" cy="16" r="10" fill="#7e57c2"/><text class="num" x="16" y="20" text-anchor="middle">2</text>
    <text class="txt" x="50" y="28" text-anchor="middle">Load</text>
    <text class="txt" x="50" y="44" text-anchor="middle">.webtask</text>
  </g>
  <g transform="translate(260,50)">
    <rect class="step" x="0" y="0" width="100" height="56" rx="8"/>
    <circle cx="16" cy="16" r="10" fill="#7e57c2"/><text class="num" x="16" y="20" text-anchor="middle">3</text>
    <text class="txt" x="50" y="28" text-anchor="middle">Lease</text>
    <text class="txt" x="50" y="44" text-anchor="middle">window</text>
  </g>
  <g transform="translate(380,50)">
    <rect class="step" x="0" y="0" width="100" height="56" rx="8"/>
    <circle cx="16" cy="16" r="10" fill="#7e57c2"/><text class="num" x="16" y="20" text-anchor="middle">4</text>
    <text class="txt" x="50" y="28" text-anchor="middle">Run</text>
    <text class="txt" x="50" y="44" text-anchor="middle">flow</text>
  </g>
  <g transform="translate(500,50)">
    <rect class="step" x="0" y="0" width="100" height="56" rx="8"/>
    <circle cx="16" cy="16" r="10" fill="#7e57c2"/><text class="num" x="16" y="20" text-anchor="middle">5</text>
    <text class="txt" x="50" y="28" text-anchor="middle">Release</text>
    <text class="txt" x="50" y="44" text-anchor="middle">window</text>
  </g>
  <g transform="translate(620,50)">
    <rect class="step" x="0" y="0" width="100" height="56" rx="8"/>
    <circle cx="16" cy="16" r="10" fill="#7e57c2"/><text class="num" x="16" y="20" text-anchor="middle">6</text>
    <text class="txt" x="50" y="28" text-anchor="middle">JSON</text>
    <text class="txt" x="50" y="44" text-anchor="middle">response</text>
  </g>

  <line class="line animate-line" x1="120" y1="78" x2="138" y2="78"/>
  <line class="line animate-line" x1="240" y1="78" x2="258" y2="78"/>
  <line class="line animate-line" x1="360" y1="78" x2="378" y2="78"/>
  <line class="line animate-line" x1="480" y1="78" x2="498" y2="78"/>
  <line class="line animate-line" x1="600" y1="78" x2="618" y2="78"/>

  <!-- Flow steps detail -->
  <rect x="40" y="140" width="680" height="120" rx="8" fill="#fff" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="380" y="165" text-anchor="middle" font="600 13px system-ui,sans-serif" fill="#6a1b9a">Inside step 4  flow interpreter walks each command</text>
  <text x="60" y="195" class="txt" font-family="monospace" font-size="11">goto ’ wait-for ’ extract ’ return</text>
  <text x="60" y="220" class="txt" font-size="11">Each step: resolve {{templates}} ’ dispatch run: action ’ store result under as:</text>
  <text x="60" y="245" class="txt" font-size="11">status: lines become SSE events when Accept: text/event-stream</text>
</svg>
