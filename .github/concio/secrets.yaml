# The Concio login flow reads two runtime values, both templated into
# login.js. Resolution chain for each: env → --NAME=… arg → interactive
# prompt. Neither has a default — the server refuses to start the Concio
# flow until they're supplied.
secrets:
  - name: CONCIO_USER
    description: "Concio account user ID (the login form's username)"
    required: true
    sensitive: false
    sources: ["env", "arg", "prompt"]
  - name: CONCIO_PASSWORD
    description: "Concio account password"
    required: true
    sensitive: true
    sources: ["env", "arg", "prompt"]
