# Sample secrets declaration. Each entry is resolved in `sources` order:
#   env    - os.Getenv(name)
#   arg    - --<name>=value on the command line
#   prompt - interactive TTY prompt (sensitive=true reads without echo)
# Resolved values are exported as env vars so YAML `{{NAME}}` finds them.

secrets:
  - name: GREETING
    description: "Optional greeting shown by demo tasks"
    sensitive: false
    sources: ["env", "arg"]
    default: "Hello"
