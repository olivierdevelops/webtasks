site_name: webtasks
site_description: Browser-automation server — .webtask recipes over HTTP, powered by chromedp
site_url: https://olivierdevelops.github.io/webtasks/
repo_url: https://github.com/olivierdevelops/webtasks
repo_name: olivierdevelops/webtasks
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

# Existing docs link to repo source files outside docs/ — warn, don't fail.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Usage guide: usage.md
  - How it works: how-it-works.md
  - Writing tasks: writing-tasks.md
  - Examples:
    - demos/index.md
    - Basics: demos/basics.md
    - Crawl & scrape: demos/crawl.md
    - Search: demos/search.md
    - Interaction: demos/interaction.md
    - Streaming (SSE): demos/streaming.md
    - JS modules: demos/js-modules.md
    - Downloads: demos/downloads.md
    - Rendering: demos/rendering.md
    - Network: demos/network.md
    - Backend & export: demos/backend.md
    - Control flow: demos/control.md
    - Recording: demos/recording.md
    - Real-world (Concio): demos/concio.md
  - Recipes: cookbook.md
  - Actions reference: actions.md
  - CLI & commands: cli.md
  - Reference:
    - HTTP API: http-api.md
    - Templating: templating.md
    - Deployment: deploy.md
  - License: license.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/olivierdevelops/webtasks
  generator: false
