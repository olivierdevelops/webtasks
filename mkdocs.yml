    - Search: demos/search.md
    - Interaction: demos/interaction.md
    - Streaming (SSE): demos/streaming.md
    - JS modules: demos/js-modules.md
    - Downloads: demos/downloads.md
    - Rendering: demos/rendering.md
    - Network: demos/network.md
    - Backend & export: demos/backend.md
    - Control flow: demos/control.md
    - Recording: demos/recording.md
    - Real-world (Concio): demos/concio.md
  - Guides:
    - Build your own task: build-your-own-task.md
